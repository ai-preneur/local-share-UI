<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22d3a0"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0c0d14"/>
      <stop offset="100%" stop-color="#0c0d14"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Share icon: three nodes + two connecting lines -->
  <!-- Top-right node -->
  <circle cx="46" cy="14" r="7" fill="#0c0d14"/>
  <!-- Left node -->
  <circle cx="18" cy="32" r="7" fill="#0c0d14"/>
  <!-- Bottom-right node -->
  <circle cx="46" cy="50" r="7" fill="#0c0d14"/>

  <!-- Lines connecting nodes -->
  <line x1="39" y1="18" x2="25" y2="28" stroke="#0c0d14" stroke-width="5" stroke-linecap="round"/>
  <line x1="39" y1="46" x2="25" y2="36" stroke="#0c0d14" stroke-width="5" stroke-linecap="round"/>
</svg>
